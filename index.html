<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sistem Manajemen Gudang Senjata Batalyon B Pelopor</title>
    
    <!-- Active PWA Service Worker & Notification Shield -->
    <script>
      (function() {
        // Completely overwrite and block the browser Notification API to prevent any permission prompts
        try {
          if (typeof window !== 'undefined') {
            Object.defineProperty(window, 'Notification', {
              get: function() {
                return {
                  permission: 'denied',
                  requestPermission: function() {
                    return Promise.resolve('denied');
                  }
                };
              },
              configurable: false,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Failed to lock notification API: ", e);
        }

        // Register the PWA Service Worker for Mobile Installation support
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) {
                console.log('PWA ServiceWorker registered with scope:', reg.scope);
              })
              .catch(function(err) {
                console.error('PWA ServiceWorker registration failed:', err);
              });
          });
        }
      })();
    </script>

    <!-- PWA & Mobile Web App Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gudang Senjata" />
    <meta name="theme-color" content="#061225" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
